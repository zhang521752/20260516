    /* 根据预设获取有效的 baseUrl 和 model */
    function resolveApiEndpoint(savedConfig, key) {
      const ek = savedConfig.encryptedKeys?.[key];
      if (!ek) return { baseUrl: '', model: '', provider: '' };

      // 兼容旧格式：如果有 baseUrl 但没有 presetIndex，尝试匹配预设
      let presetIndex = ek.presetIndex;
      if (presetIndex === undefined) {
        if (ek.baseUrl) {
          const presets = AI_MODEL_PRESETS[key] || [];
          const matchedIdx = presets.findIndex(p => p.baseUrl === ek.baseUrl);
          presetIndex = matchedIdx >= 0 ? matchedIdx : (presets.length - 1);
        } else {
          presetIndex = 0;
        }
      }

      const presets = AI_MODEL_PRESETS[key];
      const preset = presets?.[presetIndex];
      const isCustom = preset?.provider === 'Custom';

      const baseUrl = isCustom ? (ek.customBaseUrl || ek.baseUrl || '') : (preset?.baseUrl || '');
      const model = isCustom ? (ek.customModel || '') : (preset?.model || '');
      const provider = isCustom ? 'Custom' : (preset?.provider || '');

      return { baseUrl, model, provider };
    }

    /* 将预设选项按provider分组（用于optgroup） */
    function groupPresetsByProvider(presets) {
      const groups = [];
      const groupMap = {};
      presets.forEach((p, idx) => {
        if (!groupMap[p.provider]) {
          groupMap[p.provider] = { label: p.provider, options: [] };
          groups.push(groupMap[p.provider]);
        }
        groupMap[p.provider].options.push({ ...p, index: idx });
      });
      return groups;
    }

    /* ─── 点数系统（带签名防篡改） ─── */
    const POINTS_PER_OPTIMIZE = 50;
    const DEFAULT_PLATFORM_POINTS = 860;
    const BALANCE_SALT = 'BalanceSign2026!@#';

    function saveSignedBalance(points) {
      const sign = CryptoJS.SHA256(String(points) + BALANCE_SALT).toString().substring(0, 16);
      localStorage.setItem('comic_workbench_points', String(points));
      localStorage.setItem('comic_workbench_points_sign', sign);
      // 同步到 localForage 作为持久化备份
      workbenchStore.setItem('signedBalance', { points, sign }).catch(e => console.error('余额持久化失败:', e));
    }

    function loadSignedBalance() {
      const points = parseInt(localStorage.getItem('comic_workbench_points') || '0');
      const sign = localStorage.getItem('comic_workbench_points_sign') || '';
      const expectedSign = CryptoJS.SHA256(String(points) + BALANCE_SALT).toString().substring(0, 16);
      if (sign !== expectedSign) {
        // 签名不匹配，余额被篡改！重置为0
        saveSignedBalance(0);
        return { points: 0, tampered: true };
      }
      return { points, tampered: false };
    }

    (function initBalance() {
      const newKey = localStorage.getItem('comic_workbench_points');
      const oldKey = localStorage.getItem('comic_workbench_platform_points');
      if (newKey === null) {
        // 新key不存在，尝试从旧key迁移
        if (oldKey !== null) {
          const oldPoints = parseInt(oldKey, 10);
          if (!isNaN(oldPoints) && oldPoints > 0) {
            saveSignedBalance(oldPoints);
          } else {
            saveSignedBalance(DEFAULT_PLATFORM_POINTS);
          }
        } else {
          saveSignedBalance(DEFAULT_PLATFORM_POINTS);
        }
      }
      // 清理旧key
      if (oldKey !== null) {
        localStorage.removeItem('comic_workbench_platform_points');
      }
    })();

    function getPlatformPoints() {
      const result = loadSignedBalance();
      return result.points;
    }

    function deductPlatformPoints(amount) {
      const current = getPlatformPoints();
      const newPoints = Math.max(0, current - amount);
      saveSignedBalance(newPoints);
      return newPoints;
    }

    function addPlatformPoints(amount) {
      const current = getPlatformPoints();
      const newPoints = current + amount;
      saveSignedBalance(newPoints);
      return newPoints;
    }

    /* ─── 卡密激活码系统 ─── */
    const CARD_SECRET_SALT = 'ComicWorkbench2026Salt!@#';

    function generateCheckCode(timestamp, amount) {
      const raw = String(timestamp) + String(amount) + CARD_SECRET_SALT;
      const hash = CryptoJS.SHA256(raw).toString();
      return hash.substring(0, 8).toUpperCase();
    }

    function generateCardKey(amount) {
      const timestamp = Math.floor(Date.now() / 1000);
      const checkCode = generateCheckCode(timestamp, amount);
      return `MC-${amount}-${timestamp}-${checkCode}`;
    }

    function validateCardKey(cardKey) {
      // 1. 格式校验：MC-{amount}-{timestamp}-{checkCode}
      const parts = cardKey.split('-');
      if (parts.length !== 4 || parts[0] !== 'MC') {
        return { valid: false, error: '卡密格式错误' };
      }

      const amount = parseInt(parts[1]);
      const timestamp = parseInt(parts[2]);
      const checkCode = parts[3];

      // 2. 面额校验
      if (![100, 500, 2000].includes(amount)) {
        return { valid: false, error: '无效的面额' };
      }

      // 3. 时间戳校验（7天有效期）
      const now = Math.floor(Date.now() / 1000);
      const SEVEN_DAYS = 7 * 24 * 3600;
      if (timestamp > now + 300 || timestamp < now - SEVEN_DAYS) {
        return { valid: false, error: '卡密已过期' };
      }

      // 4. 校验码验证
      const expectedCode = generateCheckCode(timestamp, amount);
      if (checkCode !== expectedCode) {
        return { valid: false, error: '校验码无效，卡密不合法' };
      }

    /* ─── IndexedDB 辅助函数 ─── */
    const DB_NAME = 'ComicWorkbenchDB';
    const DB_VERSION = 2;
    const STORE_NAME = 'assets';
    const REDEEMED_STORE = 'redeemed_cards';

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          const oldVersion = e.oldVersion;
          // 版本1：创建 assets store
          if (oldVersion < 1) {
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
          }
          // 版本2：创建 redeemed_cards store
          if (oldVersion < 2) {
            if (!db.objectStoreNames.contains(REDEEMED_STORE)) {
              db.createObjectStore(REDEEMED_STORE, { keyPath: 'cardHash' });
            }
          }
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function isCardRedeemed(cardHash) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(REDEEMED_STORE, 'readonly');
        const store = tx.objectStore(REDEEMED_STORE);
        const req = store.get(cardHash);
        req.onsuccess = () => resolve(!!req.result);
        req.onerror = () => reject(req.error);
        tx.oncomplete = () => db.close();
      });
    }

    async function markCardRedeemed(cardHash, cardKey, amount) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(REDEEMED_STORE, 'readwrite');
        const store = tx.objectStore(REDEEMED_STORE);
        const req = store.put({
          cardHash,
          cardKey,
          amount,
          redeemedAt: Date.now()
        });
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
        tx.oncomplete = () => db.close();
      });
    }

    async function dbPutAsset(record) {

        const req = store.put(record);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
        tx.oncomplete = () => db.close();
      });
    }

    const _persistTimeouts = {};
    function debouncedPersist(key, data, delay = 300) {

    /* Base64 转 Blob */
    function base64ToBlob(base64, mimeType = 'image/png') {
      const byteString = atob(base64.split(',')[1] || base64);
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
      return new Blob([ab], { type: mimeType });
    }

    /* 迁移旧 localStorage 数据到 localForage */
    async function migrateFromLocalStorage() {
      // 迁移 API 配置
      const oldApiConfig = localStorage.getItem('comic_workbench_api_config');
      if (oldApiConfig) {
        try {
          const existing = await workbenchStore.getItem('apiConfig');
          if (!existing) {
            const config = JSON.parse(oldApiConfig);
            await workbenchStore.setItem('apiConfig', config);
          }
          localStorage.removeItem('comic_workbench_api_config');
        } catch (e) { console.warn('迁移API配置失败:', e); }
      }

      // 迁移算力余额（带签名）到 localForage 作为备份
      const oldPoints = localStorage.getItem('comic_workbench_points');
      const oldSign = localStorage.getItem('comic_workbench_points_sign');
      if (oldPoints !== null) {
        try {
          const existing = await workbenchStore.getItem('signedBalance');
          if (!existing) {
            await workbenchStore.setItem('signedBalance', { points: parseInt(oldPoints), sign: oldSign || '' });
          }
          // 注意：不清除 balance 的 localStorage，保留签名验证所需的少量同步数据
        } catch (e) { console.warn('迁移余额数据失败:', e); }
      }

      // 清理已废弃的旧 key
      const deprecatedKeys = ['comic_workbench_platform_points'];
      deprecatedKeys.forEach(key => {
        if (localStorage.getItem(key) !== null) {
          localStorage.removeItem(key);
        }
      });

    /* ─── AES 加密/解密工具 ─── */
    const CONFIG_STORAGE_KEY = 'comic_workbench_api_config';

    /* API 配置内存缓存（用于同步读取，由 localForage 异步初始化填充） */
    let _apiConfigCache = null;

    function generateSalt() {
      return CryptoJS.lib.WordArray.random(128 / 8).toString();
    }

    function encryptKey(plainText, passphrase, salt) {
      return CryptoJS.AES.encrypt(plainText, passphrase + salt).toString();
    }

    function decryptKey(cipherText, passphrase, salt) {
      try {
        const bytes = CryptoJS.AES.decrypt(cipherText, passphrase + salt);
        const decrypted = bytes.toString(CryptoJS.enc.Utf8);
        if (!decrypted) return null;
        return decrypted;
      } catch (e) {
        return null;
      }
    }

    function saveApiConfig(config) {
      _apiConfigCache = config;
      localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(config));
      // 同步到 localForage
      workbenchStore.setItem('apiConfig', config).catch(e => console.error('API配置持久化失败:', e));
    }

    function loadApiConfig() {
      if (_apiConfigCache) return _apiConfigCache;
      try {
        const raw = localStorage.getItem(CONFIG_STORAGE_KEY);
        const config = raw ? JSON.parse(raw) : null;
        if (config) _apiConfigCache = config;
        return config;
      } catch (e) {
        return null;
      }
    }

    function clearApiConfig() {
      _apiConfigCache = null;
      localStorage.removeItem(CONFIG_STORAGE_KEY);
      workbenchStore.removeItem('apiConfig').catch(e => console.error('清除API配置失败:', e));
    }

    function getPasswordStrength(password) {
      if (!password) return { level: 0, label: '', color: '' };
      let score = 0;
      if (password.length >= 6) score++;
      if (password.length >= 10) score++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
      if (/\d/.test(password)) score++;
      if (/[^a-zA-Z0-9]/.test(password)) score++;
      if (score <= 1) return { level: 1, label: '弱', color: '#e74c3c' };
      if (score <= 3) return { level: 2, label: '中', color: '#f39c12' };
      return { level: 3, label: '强', color: '#00b894' };
    }

    /* ─── 左侧面板：剧本输入 ─── */
    function ScriptInputTab({ onLoadingChange, scenes, onUpdateScenes, onToast, onRequestPassword, onShowSensitiveAlert, onShowRecharge, onBalanceChange }) {
      const [scriptText, setScriptText] = useState('');
      const [storyStyle, setStoryStyle] = useState('玄幻修仙');
      const [plotRhythm, setPlotRhythm] = useState('标准推进');

      /* 从 localForage 恢复剧本相关数据 */
      useEffect(() => {
        (async () => {
          try {
            const savedScriptText = await workbenchStore.getItem('scriptText');
            const savedStoryStyle = await workbenchStore.getItem('storyStyle');
            const savedPlotRhythm = await workbenchStore.getItem('plotRhythm');
            if (savedScriptText) setScriptText(savedScriptText);
            if (savedStoryStyle) setStoryStyle(savedStoryStyle);
            if (savedPlotRhythm) setPlotRhythm(savedPlotRhythm);
          } catch (e) {
            console.warn('恢复剧本数据失败:', e);
          }
        })();
      }, []);

      /* 自动持久化剧本数据 */
      useEffect(() => {
        if (scriptText) debouncedPersist('scriptText', scriptText);
      }, [scriptText]);
      useEffect(() => {
        debouncedPersist('storyStyle', storyStyle);
      }, [storyStyle]);
      useEffect(() => {
        debouncedPersist('plotRhythm', plotRhythm);
      }, [plotRhythm]);

      /* 敏感词检查（增强版，使用全局 checkSensitiveWords 函数） */

      /* 构建系统提示词 */
      const buildSystemPrompt = () => {
        return `你是一个专业的漫剧剧本分析师。请将以下小说文本拆分为分镜剧本。

故事风格：${storyStyle}
剧情节奏：${plotRhythm}

请严格按照以下JSON格式返回，不要输出任何其他内容：
[
  {
    "sceneNumber": 1,
    "novelText": "原小说段落文本",
    "description": "该分镜的画面描述（用于AI生图的详细提示词）",
    "characters": ["出场人物1", "出场人物2"],
    "dialogue": "该分镜的配音台词"
  },
  ...
]`;
      };

      /* 解析AI返回数据（三级降级策略） */
      const parseAIResponse = (content) => {
        // 策略1：直接JSON解析
        try {
          const data = JSON.parse(content);
          if (Array.isArray(data)) return data;
        } catch(e) {}

        // 策略2：正则提取JSON数组块
        try {
          const match = content.match(/\[[\s\S]*\]/);
          if (match) {
            const data = JSON.parse(match[0]);
            if (Array.isArray(data)) return data;
          }
        } catch(e) {}

        // 策略3：按段落分割自动生成基础分镜
        const paragraphs = content.split(/\n{2,}/).filter(p => p.trim().length > 10);
        if (paragraphs.length > 0) {
          return paragraphs.map((p, i) => ({
            sceneNumber: i + 1,
            novelText: p.trim(),
            description: p.trim().substring(0, 80) + '...',
            characters: [],
            dialogue: '',
          }));
        }

        return null;
      };

      /* 主优化逻辑 */
      const handleOptimize = async () => {
        if (!scriptText.trim()) {
          onToast && onToast('请先输入剧本内容', 'error');
          return;
        }

        // ── 1. 敏感词检查（增强版） ──
        const sensitiveResult = checkSensitiveWords(scriptText);
        if (sensitiveResult.hit) {
          onShowSensitiveAlert && onShowSensitiveAlert(sensitiveResult.word, sensitiveResult.category);
          return;
        }

        // ── 2. 扣费拦截 ──
        const canProceed = await checkAndDeductPoints('optimizeScript', (pts, cost) => {
          onShowRecharge && onShowRecharge(pts, cost);
        });
        if (canProceed === 'tampered') {
          onToast && onToast('⚠️ 检测到余额数据异常，已重置为0', 'error');
          onBalanceChange && onBalanceChange();
          return;
        }
        if (!canProceed) return;
        onBalanceChange && onBalanceChange();

        // ── 3. 读取API配置 ──
        const saved = loadApiConfig();
        const isPlatformMode = !saved || saved.mode !== 'self';

        if (isPlatformMode) {
          onToast && onToast('⚠️ 平台算力服务即将上线，当前请使用自带API Key模式（在 ⚙️ 设置中配置）', 'error');
          return;
        }

        // 自带API Key模式
        if (!saved.encryptedKeys || !saved.encryptedKeys.text) {
          onToast && onToast('❌ API Key 未配置，请先在 ⚙️ 设置中配置文本模型API', 'error');
          return;
        }
        const textConfig = saved.encryptedKeys.text;
        const { baseUrl: effectiveBaseUrl, model: effectiveModel, provider: effectiveProvider } = resolveApiEndpoint(saved, 'text');
        if (!effectiveBaseUrl) {
          onToast && onToast('❌ 文本模型 Base URL 未配置，请先在 ⚙️ 设置中选择模型或填写自定义URL', 'error');
          return;
        }
        if (!effectiveModel) {
          onToast && onToast('❌ 文本模型 Model ID 未配置，请先在 ⚙️ 设置中选择模型或填写自定义Model', 'error');
          return;
        }
        if (!textConfig.encryptedKey) {
          onToast && onToast('❌ 文本模型 API Key 未配置，请先在 ⚙️ 设置中填写', 'error');
          return;
        }

        // ── 3. 解密API Key（弹密码框） ──
        let apiKey = '';
        try {
          const password = await onRequestPassword('AI优化剧本 - 输入密码解密API Key');
          if (!password) return; // 用户取消
          const decKey = decryptKey(textConfig.encryptedKey, password, saved.salt);
          if (decKey === null) {
            onToast && onToast('❌ 密码错误，无法解密API Key', 'error');
            return;
          }
          apiKey = decKey;
        } catch(e) {
          return; // 用户取消
        }

        // ── 4. 发送API请求 ──
        onLoadingChange(true);
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);

        try {
          const systemPrompt = buildSystemPrompt();
          const baseUrl = effectiveBaseUrl.replace(/\/+$/, '');
          const isAnthropic = effectiveProvider === 'Anthropic';
          const url = isAnthropic ? (baseUrl + '/messages') : (baseUrl + '/chat/completions');

          let fetchHeaders, fetchBody;
          if (isAnthropic) {
            // Anthropic API 格式
            fetchHeaders = {
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'Content-Type': 'application/json',
            };
            fetchBody = JSON.stringify({
              model: effectiveModel,
              max_tokens: 4096,
              messages: [
                { role: 'user', content: scriptText },
              ],
              system: systemPrompt,
              temperature: 0.7,
            });
          } else {
            // OpenAI 兼容格式
            fetchHeaders = {
              'Authorization': 'Bearer ' + apiKey,
              'Content-Type': 'application/json',
            };
            fetchBody = JSON.stringify({
              model: effectiveModel,
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: scriptText },
              ],
              temperature: 0.7,
            });
          }

          const response = await fetch(url, {
            method: 'POST',
            headers: fetchHeaders,
            body: fetchBody,
            signal: controller.signal,
          });

          clearTimeout(timeoutId);

          // 检查HTTP状态码
          if (!response.ok) {
            throw new Error('HTTP_' + response.status);
          }

          // 解析响应JSON
          let data;
          try {
            data = await response.json();
          } catch(e) {
            throw new Error('RESPONSE_NOT_JSON');
          }

          // 检查API返回结构（兼容 OpenAI 和 Anthropic 格式）
          let content;
          if (isAnthropic) {
            // Anthropic 格式: { content: [{ type: 'text', text: '...' }] }
            if (!data.content || !data.content[0] || !data.content[0].text) {
              throw new Error('INVALID_API_RESPONSE');
            }
            content = data.content[0].text;
          } else {
            // OpenAI 兼容格式: { choices: [{ message: { content: '...' } }] }
            if (!data.choices || !data.choices[0] || !data.choices[0].message || !data.choices[0].message.content) {
              throw new Error('INVALID_API_RESPONSE');
            }
            content = data.choices[0].message.content;
          }

          // ── 5. 解析AI返回数据 ──
          const parsed = parseAIResponse(content);
          if (!parsed || parsed.length === 0) {
            throw new Error('PARSE_SCENE_FAILED');
          }

          // ── 6. 批量灌入全局状态 ──
          const newScenes = parsed.map((item, i) => ({
            id: i + 1,
            name: 'Scene ' + (item.sceneNumber || (i + 1)),
            description: item.description || '',
            novelText: item.novelText || '',
            prompt: item.description || '',
            characters: Array.isArray(item.characters) ? item.characters : [],
            dialogue: item.dialogue || '',
            thumbnailUrl: null,
            imageUrl: null,
          }));

          onUpdateScenes(newScenes);
          onToast && onToast('✅ 剧本优化完成，已拆分为 ' + newScenes.length + ' 个分镜', 'success');

        } catch(err) {
          clearTimeout(timeoutId);
          if (err.name === 'AbortError') {
            onToast && onToast('❌ 请求超时（30秒），请检查网络或API服务状态', 'error');
          } else if (err.message.startsWith('HTTP_')) {
            const status = err.message.replace('HTTP_', '');
            onToast && onToast('❌ 服务器返回错误 [' + status + ']，请检查API地址和Key是否正确', 'error');
          } else if (err.message === 'RESPONSE_NOT_JSON') {
            onToast && onToast('❌ API返回非规范JSON，请检查API服务是否正常', 'error');
          } else if (err.message === 'INVALID_API_RESPONSE') {
            onToast && onToast('❌ API返回数据结构异常，无法提取分镜内容', 'error');
          } else if (err.message === 'PARSE_SCENE_FAILED') {
            onToast && onToast('❌ AI返回的内容无法解析为分镜数据', 'error');
          } else if (err.message && (err.message.includes('Failed to fetch') || err.message.includes('NetworkError'))) {
            onToast && onToast('❌ 网络请求失败，可能是跨域限制或网络不通', 'error');
          } else {
            onToast && onToast('❌ 未知错误：' + (err.message || '请稍后重试'), 'error');
          }
        } finally {
          onLoadingChange(false);
        }
      };

      return (
        <div className="p-4 fade-in h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-semibold text-textSecondary uppercase tracking-wider">剧本内容</h3>
            <span className="text-xs text-textSecondary bg-surface px-2 py-0.5 rounded">Markdown</span>
          </div>
          <textarea
            className="flex-1 w-full bg-surface border border-border rounded-lg p-3 text-sm text-textPrimary placeholder-textSecondary leading-relaxed focus:border-accent transition-colors"
            style={{ minHeight: '200px' }}
            placeholder="请在此粘贴您的小说正文或大纲..."
            value={scriptText}
            onChange={e => setScriptText(e.target.value)}
          />
          <div className="flex gap-2 mt-3">
            <div className="flex-1">
              <label className="text-[10px] text-textSecondary block mb-1">故事风格</label>
              <select
                className="w-full bg-surface border border-border rounded-md px-2.5 py-2 text-xs text-textPrimary focus:border-accent transition-colors appearance-none cursor-pointer"
                value={storyStyle}
                onChange={e => setStoryStyle(e.target.value)}
              >
                <option>玄幻修仙</option>
                <option>都市战神</option>
                <option>霸道总裁</option>
                <option>虐恋情深</option>
              </select>
            </div>
            <div className="flex-1">
              <label className="text-[10px] text-textSecondary block mb-1">剧情节奏</label>
              <select
                className="w-full bg-surface border border-border rounded-md px-2.5 py-2 text-xs text-textPrimary focus:border-accent transition-colors appearance-none cursor-pointer"
                value={plotRhythm}
                onChange={e => setPlotRhythm(e.target.value)}
              >
                <option>极速反转</option>
                <option>标准推进</option>
                <option>细腻铺垫</option>
              </select>
            </div>
          </div>
          <button
            onClick={handleOptimize}
            className="mt-3 w-full py-3 rounded-xl font-bold text-sm text-white transition-transform hover:scale-105 active:scale-95 glow-btn"
            style={{ background: 'linear-gradient(135deg, #ff6b35, #ff8c00)' }}
          >
            🤖 AI一键优化剧本
          </button>
        </div>
      );
    }

    function AssetLibraryTab({ onToast }) {
      const defaultAssets = [
        { id: 'char-linfeng', type: 'character', name: '林枫', desc: '男主，20岁，黑发孤傲', icon: '👤', gradientFrom: '#6c5ce7', gradientTo: '#a29bfe' },
        { id: 'char-suyao', type: 'character', name: '苏瑶', desc: '女主，18岁，银发温柔', icon: '👤', gradientFrom: '#e84393', gradientTo: '#fd79a8' },
        { id: 'scene-lingxiao', type: 'scene', name: '凌霄宗大殿', desc: '仙宗主殿，金碧辉煌', icon: '🏞️', gradientFrom: '#fdcb6e', gradientTo: '#f39c12' },
        { id: 'scene-luoxia', type: 'scene', name: '落霞山谷', desc: '隐秘修炼地，云雾缭绕', icon: '🏞️', gradientFrom: '#74b9ff', gradientTo: '#0984e3' },
      ];

      const [imageUrls, setImageUrls] = useState({});
      const objectUrlRefs = useRef({});
      const fileInputRefs = useRef({});

      useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            const records = await dbGetAllAssets();
            if (cancelled) return;
            const urls = {};
            records.forEach(r => {
              if (r.imageBlob) {
                const url = URL.createObjectURL(r.imageBlob);
                urls[r.id] = url;
                objectUrlRefs.current[r.id] = url;
              }
            });
            setImageUrls(prev => ({ ...prev, ...urls }));
          } catch (err) {
            console.error('IndexedDB load error:', err);
          }
        })();
        return () => { cancelled = true; };
      }, []);

      useEffect(() => {
        return () => {
          Object.values(objectUrlRefs.current).forEach(url => {
            try { URL.revokeObjectURL(url); } catch(_) {}
          });
          objectUrlRefs.current = {};
        };
      }, []);

      const handleLocalUpload = (assetId) => {
        if (!fileInputRefs.current[assetId]) {
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = '.png,.jpg,.jpeg,.webp';
          input.style.display = 'none';
          input.onchange = async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const validTypes = ['image/png', 'image/jpeg', 'image/webp'];
            if (!validTypes.includes(file.type)) {
              onToast && onToast('仅支持 PNG、JPG、JPEG、WebP 格式的图片', 'error');
              input.value = '';
              return;
            }
            const MAX_SIZE = 5 * 1024 * 1024;
            if (file.size > MAX_SIZE) {
              const sizeMB = (file.size / 1024 / 1024).toFixed(1);
              onToast && onToast(`文件大小 ${sizeMB}MB，超过 5MB 限制`, 'error');
              input.value = '';
              return;
            }
            try {
              const blob = await file.slice(0, file.size, file.type);
              const assetInfo = defaultAssets.find(a => a.id === assetId);
              await dbPutAsset({
                id: assetId,
                type: assetInfo.type,
                name: assetInfo.name,
                imageBlob: blob,
              });
              const oldUrl = objectUrlRefs.current[assetId];
              if (oldUrl) {
                try { URL.revokeObjectURL(oldUrl); } catch(_) {}
              }
              const newUrl = URL.createObjectURL(blob);
              objectUrlRefs.current[assetId] = newUrl;
              setImageUrls(prev => ({ ...prev, [assetId]: newUrl }));
              onToast && onToast(`${assetInfo.name} 图片已上传并保存`, 'success');
            } catch (err) {
              console.error('Upload save error:', err);
              onToast && onToast('图片保存失败，请重试', 'error');
            }
            input.value = '';
          };
          fileInputRefs.current[assetId] = input;
          document.body.appendChild(input);
        }
        fileInputRefs.current[assetId].click();
      };

      const handleAIGenerate = () => {
        onToast && onToast('AI生成立绘功能开发中，敬请期待', 'info');
      };

      const characters = defaultAssets.filter(a => a.type === 'character');
      const scenes = defaultAssets.filter(a => a.type === 'scene');

      const renderGroup = (title, items, groupIcon) => (
        <div className="mb-4">
          <div className="flex items-center gap-2 mb-2.5 px-1">
            <span className="text-sm">{groupIcon}</span>
            <h4 className="text-xs font-bold text-textSecondary uppercase tracking-widest">{title}</h4>
            <div className="flex-1 h-px bg-border" />
          </div>
          <div className="space-y-2">
            {items.map(asset => (
              <div key={asset.id}
                className="flex items-center gap-3 bg-surface border border-border rounded-xl p-3 hover:border-accent/40 transition-all group"
              >
                <div className="w-20 h-20 rounded-lg flex-shrink-0 overflow-hidden relative"
                  style={{ background: `linear-gradient(135deg, ${asset.gradientFrom}33, ${asset.gradientTo}11)` }}
                >
                  {imageUrls[asset.id] ? (
                    <img src={imageUrls[asset.id]}
                      alt={asset.name}
                      style={{ width: '100%', height: '100%', objectFit: 'cover' }}
                    />
                  ) : (
                    <div className="w-full h-full flex items-center justify-center">
                      <span className="text-3xl opacity-60">{asset.icon}</span>
                    </div>
                  )}
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-semibold text-textPrimary truncate group-hover:text-accent transition-colors">
                    {asset.name}
                  </p>
                  <p className="text-[11px] text-textSecondary mt-0.5 leading-snug" style={{ display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
                    {asset.desc}
                  </p>
                </div>
                <div className="flex flex-col gap-1.5 flex-shrink-0">
                  <button
                    onClick={() => handleLocalUpload(asset.id)}
                    className="text-[10px] font-medium px-2.5 py-1.5 rounded-md transition-all whitespace-nowrap"
                    style={{ background: 'rgba(255,107,53,0.15)', color: '#ff8c5a', border: '1px solid rgba(255,107,53,0.3)' }}
                    onMouseEnter={e => e.target.style.background = 'rgba(255,107,53,0.25)'}
                    onMouseLeave={e => e.target.style.background = 'rgba(255,107,53,0.15)'}
                  >
                    📤 本地上传
                  </button>
                  <button
                    onClick={handleAIGenerate}
                    className="text-[10px] font-medium px-2.5 py-1.5 rounded-md transition-all whitespace-nowrap"
                    style={{ background: 'rgba(108,92,231,0.15)', color: '#a29bfe', border: '1px solid rgba(108,92,231,0.3)' }}
                    onMouseEnter={e => e.target.style.background = 'rgba(108,92,231,0.25)'}
                    onMouseLeave={e => e.target.style.background = 'rgba(108,92,231,0.15)'}
                  >
                    ✨ AI生成立绘
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      return (
        <div className="p-4 fade-in">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-semibold text-textSecondary uppercase tracking-wider">一致性绑定</h3>
            <span className="text-[10px] text-textSecondary bg-surface px-2 py-0.5 rounded">角色 & 场景</span>
          </div>
          {renderGroup('出场角色', characters, '👤')}
          {renderGroup('核心场景', scenes, '🏞️')}
        </div>
      );
    }

        { name: '特效_樱花飘落', type: '特效', icon: '🌸', size: '3.7 MB' },
        { name: '音效_脚步声', type: '音效', icon: '🔊', size: '0.8 MB' },
        { name: '配乐_悬疑低音', type: '配乐', icon: '🎵', size: '4.5 MB' },
      ];
      return (
        <div className="p-4 fade-in">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-semibold text-textSecondary uppercase tracking-wider">素材库</h3>
            <button className="bg-accent/20 hover:bg-accent/30 text-accent text-xs px-3 py-1 rounded-lg transition-colors">
              ↑ 上传素材
            </button>
          </div>
          <div className="space-y-1.5">
            {materials.map((m, i) => (
              <div key={i} className="flex items-center gap-3 bg-surface border border-border rounded-lg px-3 py-2.5 hover:border-accent/40 cursor-pointer transition-all group">
                <span className="text-lg">{m.icon}</span>
                <div className="flex-1 min-w-0">
                  <p className="text-xs text-textPrimary truncate group-hover:text-accent transition-colors">{m.name}</p>
                  <p className="text-[10px] text-textSecondary">{m.type} · {m.size}</p>
                </div>
                <span className="text-textSecondary hover:text-accent text-sm transition-colors">⋮</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ─── 左侧面板 ─── */
    function LeftPanel({ collapsed, onToggle, onToast, scenes, onUpdateScenes, onRequestPassword, onShowSensitiveAlert, onShowRecharge, onBalanceChange }) {
      const [activeTab, setActiveTab] = useState(0);
      const [isLoading, setIsLoading] = useState(false);
      const tabs = ['剧本输入', '全局资产库', '素材库'];

      return (
        <div className="h-full flex collapse-transition border-r border-border"
          style={{ width: collapsed ? 0 : 350, minWidth: collapsed ? 0 : 350, overflow: 'hidden' }}>
          <div className="w-[350px] h-full flex flex-col bg-panel flex-shrink-0 relative">
            <div className="flex border-b border-border flex-shrink-0">
              {tabs.map((t, i) => (
                <button
                  key={i}
                  onClick={() => setActiveTab(i)}
                  className={`flex-1 py-3 text-xs font-medium transition-all relative ${
                    activeTab === i
                      ? 'text-accent bg-tabActive'
                      : 'text-textSecondary hover:text-textPrimary hover:bg-tabHover'
                  }`}
                >
                  {t}
                  {activeTab === i && (
                    <span className="absolute bottom-0 left-1/2 -translate-x-1/2 w-8 h-0.5 bg-accent rounded-full" />
                  )}
                </button>
              ))}
            </div>
            <div className="flex-1 overflow-y-auto">
              {activeTab === 0 && <ScriptInputTab onLoadingChange={setIsLoading} scenes={scenes} onUpdateScenes={onUpdateScenes} onToast={onToast} onRequestPassword={onRequestPassword} onShowSensitiveAlert={onShowSensitiveAlert} onShowRecharge={onShowRecharge} onBalanceChange={onBalanceChange} />}
              {activeTab === 1 && <AssetLibraryTab onToast={onToast} />}
              {activeTab === 2 && <MaterialLibraryTab />}
            </div>
            {isLoading && (
              <div className="absolute inset-0 z-50 flex items-center justify-center" style={{ background: 'rgba(13, 13, 26, 0.85)', backdropFilter: 'blur(4px)' }}>
                <div className="text-center">
                  <div className="text-5xl mb-5 animate-bounce">🤖</div>
                  <p className="text-accent text-lg font-bold">
                    AI 正在疯狂拆稿中<span className="loading-dot">.</span><span className="loading-dot">.</span><span className="loading-dot">.</span>
                  </p>
                  <p className="text-textSecondary text-xs mt-2">请稍候，正在分析剧本结构与风格</p>
                </div>
              </div>
            )}
          </div>
          <button
            onClick={onToggle}
            className="w-5 h-12 bg-surface hover:bg-tabHover border border-border rounded-r-md flex items-center justify-center text-textSecondary hover:text-accent transition-all self-center flex-shrink-0 -ml-px z-10"
            title={collapsed ? '展开面板' : '折叠面板'}
          >
            {collapsed ? '›' : '‹'}
          </button>
        </div>
      );
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    /* ─── 人物多选下拉组件 ─── */
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function CharacterMultiSelect({ selected, onChange }) {
      const [open, setOpen] = useState(false);
      const containerRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (containerRef.current && !containerRef.current.contains(e.target)) {
            setOpen(false);
          }
        };
        if (open) document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, [open]);

      const toggleChar = (name) => {
        if (selected.includes(name)) {
          onChange(selected.filter(c => c !== name));
        } else {
          onChange([...selected, name]);
        }
      };

      return (
        <div ref={containerRef} className="relative">
          <div
            onClick={() => setOpen(!open)}
            className="min-h-[32px] bg-surface border border-border rounded-md px-2 py-1.5 cursor-pointer flex flex-wrap gap-1 items-center hover:border-accent/40 transition-colors"
          >
            {selected.length === 0 && (
              <span className="text-[11px] text-textSecondary">点击选择人物</span>
            )}
            {selected.map(name => {
              const c = CHAR_COLORS[name] || { bg: 'rgba(255,107,53,0.2)', border: 'rgba(255,107,53,0.5)', text: '#ff6b35' };
              return (
                <span key={name}
                  className="text-[10px] px-2 py-0.5 rounded-full font-medium inline-flex items-center gap-1"
                  style={{ background: c.bg, border: `1px solid ${c.border}`, color: c.text }}
                >
                  {name}
                  <span className="cursor-pointer opacity-60 hover:opacity-100 ml-0.5"
                    onClick={(e) => { e.stopPropagation(); toggleChar(name); }}
                  >×</span>
                </span>
              );
            })}
            <span className="ml-auto text-textSecondary text-[10px]">{open ? '▲' : '▼'}</span>
          </div>
          {open && (
            <div className="absolute top-full left-0 right-0 mt-1 bg-panel border border-border rounded-lg shadow-2xl z-50 py-1 max-h-48 overflow-y-auto fade-in">
              {GLOBAL_CHARACTERS.map(name => {
                const isSelected = selected.includes(name);
                const c = CHAR_COLORS[name] || { bg: 'rgba(255,107,53,0.2)', border: 'rgba(255,107,53,0.5)', text: '#ff6b35' };
                return (
                  <div key={name}
                    onClick={() => toggleChar(name)}
                    className="px-3 py-2 cursor-pointer hover:bg-surface/80 flex items-center gap-2 transition-colors"
                  >
                    <div className="w-4 h-4 rounded border-2 flex items-center justify-center flex-shrink-0"
                      style={{
                        borderColor: isSelected ? c.text : '#2a2a4a',
                        background: isSelected ? c.bg : 'transparent',
                      }}
                    >
                      {isSelected && <span style={{ color: c.text, fontSize: 10 }}>✓</span>}
                    </div>
                    <span className={`text-xs ${isSelected ? 'text-textPrimary' : 'text-textSecondary'}`}>{name}</span>
                    {isSelected && (
                      <span className="ml-auto text-[9px] px-1.5 py-0.5 rounded-full"
                        style={{ background: c.bg, color: c.text, border: `1px solid ${c.border}` }}
                      >已选</span>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    /* ─── 可编辑单元格组件（双击编辑） ─── */
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function EditableCell({ value, onChange, type = 'text', placeholder = '' }) {
      const [editing, setEditing] = useState(false);
      const [editValue, setEditValue] = useState(value);
      const inputRef = useRef(null);

      useEffect(() => {
        if (editing && inputRef.current) {
          inputRef.current.focus();
        }
      }, [editing]);

      useEffect(() => {
        setEditValue(value);
      }, [value]);

      const handleSave = () => {
        setEditing(false);
        if (editValue !== value) {
          onChange(editValue);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && type !== 'textarea') {
          e.preventDefault();
          handleSave();
        }
        if (e.key === 'Escape') {
          setEditValue(value);
          setEditing(false);
        }
      };

      if (!editing) {
        return (
          <div
            onDoubleClick={() => setEditing(true)}
            className="cursor-pointer min-h-[28px] flex items-center px-2 py-1 rounded hover:bg-surface/80 transition-colors group"
            title="双击编辑"
          >
            <span className={`text-xs ${value ? 'text-textPrimary' : 'text-textSecondary/50'}`}>
              {value || placeholder || '双击编辑'}
            </span>
            <span className="ml-auto text-[9px] text-textSecondary/0 group-hover:text-textSecondary/60 transition-colors">✏️</span>
          </div>
        );
      }

      if (type === 'textarea') {
        return (
          <textarea
            ref={inputRef}
            value={editValue}
            onChange={e => setEditValue(e.target.value)}
            onBlur={handleSave}
            onKeyDown={e => { if (e.key === 'Escape') { setEditValue(value); setEditing(false); } }}
            className="w-full bg-canvas border-2 border-accent rounded px-2 py-1 text-xs text-textPrimary leading-relaxed"
            style={{ minHeight: 60, resize: 'none' }}
          />
        );
      }

      return (
        <input
          ref={inputRef}
          type="text"
          value={editValue}
          onChange={e => setEditValue(e.target.value)}
          onBlur={handleSave}
          onKeyDown={handleKeyDown}
          className="w-full bg-canvas border-2 border-accent rounded px-2 py-1 text-xs text-textPrimary"
        />
      );
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    /* ─── 单镜控制卡片组件 ─── */
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function SceneControlCard({ scene, onUpdateScene, onToast, onShowSensitiveAlert, onShowRecharge, onBalanceChange }) {
      const [generating, setGenerating] = useState(false);
      const [polishing, setPolishing] = useState(false);
      const [imageLoaded, setImageLoaded] = useState(false);

      /* 重新生成图片（含扣费拦截） */
      const handleRegenerate = async () => {
        // 扣费拦截
        const canProceed = await checkAndDeductPoints('generateImage', (pts, cost) => {
          onShowRecharge && onShowRecharge(pts, cost);
        });
        if (canProceed === 'tampered') {
          onToast && onToast('⚠️ 检测到余额数据异常，已重置为0', 'error');
          onBalanceChange && onBalanceChange();
          return;
        }
        if (!canProceed) return;
        onBalanceChange && onBalanceChange();

        setGenerating(true);
        setImageLoaded(false);
        setTimeout(() => {
          onUpdateScene({ ...scene, imageUrl: 'generated', thumbnailUrl: 'generated' });
          setGenerating(false);
          onToast && onToast(`${scene.name} 图片已重新生成（-5点）`, 'success');
        }, 2500);
      };

      /* AI 辅助润色提示词（含敏感词检查+扣费） */
      const handlePolishPrompt = async () => {
        // 敏感词检查
        const sensitiveResult = checkSensitiveWords(scene.prompt + ' ' + scene.description);
        if (sensitiveResult.hit) {
          onShowSensitiveAlert && onShowSensitiveAlert(sensitiveResult.word, sensitiveResult.category);
          return;
        }

        // 扣费拦截（润色使用 optimizeScript 价格 2点）
        const canProceed = await checkAndDeductPoints('optimizeScript', (pts, cost) => {
          onShowRecharge && onShowRecharge(pts, cost);
        });
        if (canProceed === 'tampered') {
          onToast && onToast('⚠️ 检测到余额数据异常，已重置为0', 'error');
          onBalanceChange && onBalanceChange();
          return;
        }
        if (!canProceed) return;
        onBalanceChange && onBalanceChange();

        setPolishing(true);
        setTimeout(() => {
          const enhanced = scene.prompt
            .replace(/anime art style/g, 'highly detailed anime art style, cinematic composition, volumetric lighting, ultra HD, masterpiece, best quality')
            .replace(/Chinese xianxia style/g, 'Chinese xianxia style, ethereal atmosphere, mystical aura, dynamic composition, ray tracing');
          const finalPrompt = enhanced.includes('masterpiece')
            ? enhanced
            : enhanced + ', highly detailed, cinematic composition, volumetric lighting, masterpiece, best quality, ultra HD';
          onUpdateScene({ ...scene, prompt: finalPrompt });
          setPolishing(false);
          onToast && onToast(`${scene.name} 提示词已AI润色（-2点）`, 'success');
        }, 1500);
      };

      /* 分镜渐变色（每镜不同） */
      const sceneGradients = [
        'linear-gradient(135deg, #0f0c29, #302b63, #24243e)',
        'linear-gradient(135deg, #1a0a2e, #3d1a6e, #2d1b4e)',
        'linear-gradient(135deg, #0a1a2e, #1a3d5e, #0d2d4e)',
        'linear-gradient(135deg, #2e0a0a, #5e1a1a, #4e0d0d)',
        'linear-gradient(135deg, #0a2e1a, #1a5e3d, #0d4e2d)',
      ];

      const hasImage = scene.imageUrl || scene.thumbnailUrl;

      return (
        <div className="fade-in flex flex-col items-center w-full max-w-md mx-auto gap-4">
          {/* 图片显示区 9:16 */}
          <div className="w-full flex justify-center">
            <div
              className="relative overflow-hidden rounded-xl border border-border/60 shadow-lg"
              style={{ width: 240, aspectRatio: '9/16' }}
            >
              {generating ? (
                /* 正在生成 */
                <div className="w-full h-full shimmer-bg flex flex-col items-center justify-center">
                  <div className="text-3xl mb-2 animate-pulse">🎨</div>
                  <p className="text-accent text-xs font-semibold">正在生成...</p>
                  <p className="text-textSecondary text-[10px] mt-1">AI 绘图中，请稍候</p>
                </div>
              ) : hasImage ? (
                /* 有图片 - 模糊缩略图 -> 清晰版本 */
                <div className="w-full h-full relative">
                  {/* 模糊缩略图层 */}
                  <div
                    className="absolute inset-0 transition-opacity duration-700"
                    style={{
                      background: sceneGradients[(scene.id - 1) % sceneGradients.length],
                      filter: imageLoaded ? 'none' : 'blur(20px)',
                      opacity: imageLoaded ? 0 : 1,
                      zIndex: 1,
                    }}
                  />
                  {/* 清晰图模拟层 */}
                  <div
                    className={`absolute inset-0 transition-opacity duration-700 ${imageLoaded ? 'blur-reveal' : ''}`}
                    style={{
                      background: sceneGradients[(scene.id - 1) % sceneGradients.length],
                      opacity: imageLoaded ? 1 : 0,
                      zIndex: 2,
                    }}
                  >
                    <div className="w-full h-full flex flex-col items-center justify-center p-4">
                      <div className="text-4xl mb-2">🖼️</div>
                      <p className="text-textPrimary text-xs font-semibold">{scene.name}</p>
                      <p className="text-textSecondary text-[9px] mt-1">AI生成图片</p>
                    </div>
                  </div>
                  {/* 模拟加载完成后切换 */}
                  {!imageLoaded && setTimeout(() => setImageLoaded(true), 800) && null}
                </div>
              ) : (
                /* 无图片占位 */
                <div
                  className="w-full h-full flex flex-col items-center justify-center"
                  style={{ background: sceneGradients[(scene.id - 1) % sceneGradients.length] }}
                >
                  <div className="text-3xl mb-2 opacity-40">🎬</div>
                  <p className="text-textSecondary/60 text-xs">等待生成</p>
                </div>
              )}
            </div>
          </div>

          {/* 画面描述 */}
          <div className="w-full">
            <label className="text-[10px] text-textSecondary block mb-1 font-medium">📝 画面描述</label>
            <textarea
              className="w-full bg-surface border border-border rounded-lg p-3 text-xs text-textPrimary placeholder-textSecondary leading-relaxed focus:border-accent transition-colors"
              style={{ minHeight: 72 }}
              value={scene.description}
              onChange={e => onUpdateScene({ ...scene, description: e.target.value })}
              placeholder="描述当前镜头画面..."
            />
          </div>

          {/* 操作按钮 */}
          <div className="w-full flex gap-2">
            <button
              onClick={handleRegenerate}
              disabled={generating}
              className="flex-1 py-2.5 rounded-lg text-xs font-bold text-white transition-all hover:scale-[1.02] active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
              style={{ background: generating ? '#555' : 'linear-gradient(135deg, #6c5ce7, #a29bfe)' }}
            >
              {generating ? '⏳ 生成中...' : '🔄 重新生成图片'}
            </button>
            <button
              onClick={handlePolishPrompt}
              disabled={polishing}
              className="flex-1 py-2.5 rounded-lg text-xs font-bold text-white transition-all hover:scale-[1.02] active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
              style={{ background: polishing ? '#555' : 'linear-gradient(135deg, #ff6b35, #e84393)' }}
            >
              {polishing ? '⏳ 润色中...' : '✨ AI辅助润色提示词'}
            </button>
          </div>

          {/* AI提示词预览 */}
          <div className="w-full">
            <label className="text-[10px] text-textSecondary block mb-1 font-medium">🎨 AI生图提示词</label>
            <div className="bg-surface border border-border rounded-lg p-2.5 text-[11px] text-textSecondary leading-relaxed max-h-20 overflow-y-auto">
              {scene.prompt}
            </div>
          </div>

          {/* 出场人物 & 台词 */}
          <div className="w-full flex gap-3">
            <div className="flex-1">
              <label className="text-[10px] text-textSecondary block mb-1 font-medium">👥 出场人物</label>
              <div className="flex flex-wrap gap-1">
                {scene.characters.map(name => {
                  const c = CHAR_COLORS[name] || { bg: 'rgba(255,107,53,0.2)', border: 'rgba(255,107,53,0.5)', text: '#ff6b35' };
                  return (
                    <span key={name}
                      className="text-[10px] px-2 py-0.5 rounded-full font-medium"
                      style={{ background: c.bg, border: `1px solid ${c.border}`, color: c.text }}
                    >
                      {name}
                    </span>
                  );
                })}
              </div>
            </div>
          </div>
          <div className="w-full">
            <label className="text-[10px] text-textSecondary block mb-1 font-medium">🎙️ 配音台词</label>
            <textarea
              className="w-full bg-surface border border-border rounded-lg p-2.5 text-xs text-textPrimary placeholder-textSecondary leading-relaxed focus:border-accent transition-colors"
              style={{ minHeight: 48 }}
              value={scene.dialogue}
              onChange={e => onUpdateScene({ ...scene, dialogue: e.target.value })}
              placeholder="输入配音台词..."
            />
          </div>
        </div>
      );
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    /* ─── 时间轴视图（含单镜控制） ─── */
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function TimelineView({ scenes, selectedSceneId, onSelectScene, onUpdateScene, onToast }) {
      const sceneColors = ['#6c5ce7', '#e84393', '#fdcb6e', '#00b894', '#ff6b35', '#74b9ff'];

      return (
        <div className="fade-in">
          {/* 分镜标记条 */}
          <div className="flex items-center gap-1 mb-3 px-1">
            {scenes.map((scene, i) => {
              const isSelected = scene.id === selectedSceneId;
              const color = sceneColors[i % sceneColors.length];
              return (
                <button
                  key={scene.id}
                  onClick={() => onSelectScene(scene.id)}
                  className={`flex-1 py-2 rounded-lg text-[11px] font-semibold transition-all relative overflow-hidden ${
                    isSelected
                      ? 'text-white shadow-lg'
                      : 'text-textSecondary bg-surface hover:bg-tabHover border border-border'
                  }`}
                  style={isSelected ? {
                    background: `linear-gradient(135deg, ${color}cc, ${color}88)`,
                    border: `1px solid ${color}`,
                    boxShadow: `0 2px 12px ${color}44`,
                  } : {}}
                >
                  <div className="flex items-center justify-center gap-1">
                    <div className="w-1.5 h-1.5 rounded-full" style={{ background: isSelected ? '#fff' : color }} />
                    <span>S{scene.id}</span>
                  </div>
                  {isSelected && (
                    <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-4/5 h-0.5 bg-white/50 rounded-full" />
                  )}
                </button>
              );
            })}
          </div>

          {/* 时间轴条 */}
          <div className="flex items-center gap-2 mb-1">
            <span className="text-[9px] text-textSecondary flex-shrink-0">00:00</span>
            <div className="flex-1 h-1.5 bg-surface rounded-full relative">
              {scenes.map((scene, i) => (
                <div
                  key={scene.id}
                  className="absolute top-1/2 -translate-y-1/2 w-3 h-3 rounded-full border-2 cursor-pointer hover:scale-125 transition-transform"
                  style={{
                    left: `${(i / (scenes.length - 1)) * 100}%`,
                    background: sceneColors[i % sceneColors.length],
                    borderColor: scene.id === selectedSceneId ? '#fff' : '#1a1a2e',
                    boxShadow: scene.id === selectedSceneId ? `0 0 8px ${sceneColors[i % sceneColors.length]}88` : 'none',
                  }}
                  onClick={() => onSelectScene(scene.id)}
                />
              ))}
            </div>

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

            if (savedSelectedSceneId && scenes.some(s => s.id === savedSelectedSceneId)) {

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    /* ─── FFmpeg.wasm 渲染引擎 ─── */
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    /* 检测 WebAssembly 支持 */
    function isWebAssemblySupported() {
      try {
        if (typeof WebAssembly === 'object' && typeof WebAssembly.instantiate === 'function') {
          const module = new WebAssembly.Module(Uint8Array.of(0x0, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00));
          if (module instanceof WebAssembly.Module) return true;
        }
      } catch (e) {}
      return false;
    }

    /* 为场景生成 Canvas 模拟图片（PNG Uint8Array） */
    function generateSceneImage(scene, index, platform, resolution) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        // 根据平台和分辨率设定画布尺寸
        const isVertical = (platform === 'douyin');
        const resMultiplier = { '720p': 0.67, '1080p': 1, '4k': 2 }[resolution] || 1;
        canvas.width = Math.round((isVertical ? 1080 : 1920) * resMultiplier);
        canvas.height = Math.round((isVertical ? 1920 : 1080) * resMultiplier);
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;

        // 绘制渐变背景
        const gradients = [
          ['#0f0c29', '#302b63', '#24243e'],
          ['#1a1a2e', '#16213e', '#0f3460'],
          ['#0d0d1a', '#1a1a3e', '#2d1b69'],
          ['#1b1b2f', '#162447', '#1f4068'],
          ['#0a0a23', '#1b1b4b', '#3a0ca3'],
        ];
        const gradColors = gradients[index % gradients.length];
        const grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, gradColors[0]);
        grad.addColorStop(0.5, gradColors[1]);
        grad.addColorStop(1, gradColors[2]);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        // 装饰粒子
        ctx.globalAlpha = 0.15;
        for (let i = 0; i < 60; i++) {
          const px = Math.random() * w;
          const py = Math.random() * h;
          const pr = Math.random() * 3 + 1;
          ctx.beginPath();
          ctx.arc(px, py, pr, 0, Math.PI * 2);
          ctx.fillStyle = ['#ff6b35', '#e84393', '#a29bfe', '#74b9ff', '#fdcb6e'][Math.floor(Math.random() * 5)];
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        // 场景编号
        const titleSize = Math.round(w * 0.045);
        ctx.fillStyle = '#ff6b35';
        ctx.font = `bold ${titleSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(scene.name || `Scene ${index + 1}`, w / 2, h * 0.38);

        // 场景描述
        const descSize = Math.round(w * 0.022);
        ctx.fillStyle = '#e8e8f0';
        ctx.font = `${descSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
        // 自动换行
        const desc = scene.description || '';
        const maxLineWidth = w * 0.75;
        const lines = [];
        let currentLine = '';
        for (const char of desc) {
          const testLine = currentLine + char;
          if (ctx.measureText(testLine).width > maxLineWidth) {
            lines.push(currentLine);
            currentLine = char;
          } else {
            currentLine = testLine;
          }
        }
        if (currentLine) lines.push(currentLine);
        const lineHeight = descSize * 1.6;
        const startY = h * 0.48;
        lines.slice(0, 6).forEach((line, i) => {
          ctx.fillText(line, w / 2, startY + i * lineHeight);
        });

        // 台词
        if (scene.dialogue) {
          const dlgSize = Math.round(w * 0.018);
          ctx.fillStyle = '#a29bfe';
          ctx.font = `${dlgSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
          const dlgLines = [];
          let dlgCurrent = '';
          const dlg = scene.dialogue.replace(/\n/g, ' ');
          for (const char of dlg) {
            const testLine = dlgCurrent + char;
            if (ctx.measureText(testLine).width > maxLineWidth) {
              dlgLines.push(dlgCurrent);
              dlgCurrent = char;
            } else {
              dlgCurrent = testLine;
            }
          }
          if (dlgCurrent) dlgLines.push(dlgCurrent);
          const dlgStartY = h * 0.65;
          dlgLines.slice(0, 4).forEach((line, i) => {
            ctx.fillText(line, w / 2, dlgStartY + i * (dlgSize * 1.5));
          });
        }

        // 角色标签
        if (scene.characters && scene.characters.length > 0) {
          const tagSize = Math.round(w * 0.014);
          ctx.font = `${tagSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
          const tagY = h * 0.85;
          const totalWidth = scene.characters.reduce((sum, c) => sum + ctx.measureText(c).width + tagSize * 2.5, 0);
          let tagX = (w - totalWidth) / 2;
          scene.characters.forEach((char) => {
            const tw = ctx.measureText(char).width + tagSize * 1.5;
            ctx.fillStyle = 'rgba(255,107,53,0.15)';
            ctx.beginPath();
            const radius = tagSize * 0.6;
            const rx = tagX, ry = tagY - tagSize * 0.7, rw = tw, rh = tagSize * 1.8, rr = Math.min(radius, rw / 2, rh / 2);
            ctx.moveTo(rx + rr, ry);
            ctx.lineTo(rx + rw - rr, ry);
            ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + rr);
            ctx.lineTo(rx + rw, ry + rh - rr);
            ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - rr, ry + rh);
            ctx.lineTo(rx + rr, ry + rh);
            ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - rr);
            ctx.lineTo(rx, ry + rr);
            ctx.quadraticCurveTo(rx, ry, rx + rr, ry);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,107,53,0.4)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.fillStyle = '#ff8c5a';
            ctx.textAlign = 'center';
            ctx.fillText(char, tagX + tw / 2, tagY + tagSize * 0.15);
            tagX += tw + tagSize;
          });
          ctx.textAlign = 'center';
        }

        // 底部水印
        const wmSize = Math.round(w * 0.012);
        ctx.fillStyle = 'rgba(136,136,170,0.3)';
        ctx.font = `${wmSize}px sans-serif`;
        ctx.fillText('漫剧制作工作台', w / 2, h * 0.95);

        canvas.toBlob((blob) => {
          if (!blob) { resolve(null); return; }
          const reader = new FileReader();
          reader.onload = () => {
            const arr = new Uint8Array(reader.result);
            resolve(arr);
          };
          reader.readAsArrayBuffer(blob);
        }, 'image/png');
      });
    }

    /* 从 imageUrl 获取图片 Uint8Array */
    async function fetchImageAsUint8Array(imageUrl) {
      try {
        const resp = await fetch(imageUrl);
        const blob = await resp.blob();
        const arrayBuffer = await blob.arrayBuffer();
        return new Uint8Array(arrayBuffer);
      } catch (e) {
        console.warn('fetchImageAsUint8Array failed:', e);
        return null;
      }
    }

    /* 生成 SRT 字幕内容 */
    function generateSRTContent(scene, index, sceneDurationSec) {
      const startTime = 0; // 每个场景字幕从0开始（因为单场景视频）
      const endTime = Math.min(sceneDurationSec, 5);
      const formatTime = (seconds) => {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        const ms = Math.floor((seconds % 1) * 1000);
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
      };
      const dialogue = scene.dialogue || scene.description || '';
      const cleanDialogue = dialogue.replace(/\n/g, ' ').substring(0, 100);
      return `1\n${formatTime(startTime)} --> ${formatTime(endTime)}\n${cleanDialogue}\n\n`;
    }

    /* 进度计算工具 */
    function calculateRenderProgress(stage, sceneIndex, sceneProgress, totalScenes) {
      const stage2Weight = 80;
      const perSceneWeight = totalScenes > 0 ? stage2Weight / totalScenes : 0;
      switch (stage) {
        case 'init': return Math.min(sceneProgress * 5, 5);
        case 'scene': return 5 + sceneIndex * perSceneWeight + sceneProgress * perSceneWeight;
        case 'concat': return 85 + Math.min(sceneProgress, 1) * 10;
        case 'download': return 95 + Math.min(sceneProgress, 1) * 5;
        default: return 0;
      }
    }

    /* 核心：FFmpeg.wasm 渲染流程 */
    async function renderVideoWithFFmpeg(scenes, platform, resolution, autoSubtitle, onProgress, onSceneStatus) {
      const { FFmpeg } = FFmpegWASM;
      const { fetchFile } = FFmpegUtil;
      const ffmpeg = new FFmpeg();

      // 阶段1：初始化 FFmpeg
      onProgress('init', 0, 0);
      let ffmpegLoaded = false;
      try {
        ffmpeg.on('log', ({ message }) => {
          // console.log('[FFmpeg]', message);
        });
        ffmpeg.on('progress', ({ progress }) => {
          // 单命令进度会在外层换算为总体进度
        });
        await ffmpeg.load({
          coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
          wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm',
        });
        ffmpegLoaded = true;
      } catch (e) {
        console.error('FFmpeg load failed:', e);
        throw { type: 'ffmpeg_load_failed', error: e };
      }
      onProgress('init', 0, 1);

      // 让出主线程
      await new Promise(r => setTimeout(r, 50));

      const sceneVideos = [];
      const failedScenes = [];

      // 阶段2：逐场景渲染
      for (let i = 0; i < scenes.length; i++) {
        onSceneStatus(i, 'active');
        const scene = scenes[i];

        try {
          // 准备图片数据
          const imgName = `scene_${i}.png`;
          let imageData = null;

          // 优先使用场景中已生成的图片
          if (scene.imageUrl) {
            imageData = await fetchImageAsUint8Array(scene.imageUrl);
          }

          // 如果获取失败或无图片，使用 Canvas 生成模拟图片
          if (!imageData) {
            imageData = await generateSceneImage(scene, i, platform, resolution);
          }

          if (!imageData) {
            throw new Error('无法生成场景图片');
          }

          await ffmpeg.writeFile(imgName, imageData);
          onProgress('scene', i, 0.2, scenes.length);
          await new Promise(r => setTimeout(r, 30));

          // 准备音频（如果有）
          let hasAudio = false;
          const audioName = `scene_${i}_audio.mp3`;

          // 检查场景是否有音频URL（未来扩展）
          if (scene.audioUrl) {
            try {
              const audioData = await fetchFile(scene.audioUrl);
              if (audioData && audioData.length > 0) {
                await ffmpeg.writeFile(audioName, audioData);
                hasAudio = true;
              }
            } catch (e) {
              console.warn(`Scene ${i} audio fetch failed:`, e);
            }
          }

          onProgress('scene', i, 0.4, scenes.length);
          await new Promise(r => setTimeout(r, 30));

          // 准备字幕（如果勾选）
          let hasSubtitle = false;
          const srtName = `scene_${i}.srt`;
          if (autoSubtitle && (scene.dialogue || scene.description)) {
            const srtContent = generateSRTContent(scene, i, 5);
            const srtData = new TextEncoder().encode(srtContent);
            await ffmpeg.writeFile(srtName, srtData);
            hasSubtitle = true;
          }

          onProgress('scene', i, 0.5, scenes.length);
          await new Promise(r => setTimeout(r, 30));

          // 构建FFmpeg命令
          const outputName = `scene_${i}.mp4`;
          const args = ['-loop', '1', '-i', imgName];

          if (hasAudio) {
            args.push('-i', audioName);
          }

          // 视频滤镜
          const vfFilters = [];
          if (hasSubtitle) {
            // subtitles filter需要转义特殊字符
            const escapedSrtName = srtName.replace("'", "'\\''");
            vfFilters.push(`subtitles='${escapedSrtName}'`);
          }

          if (vfFilters.length > 0) {
            args.push('-vf', vfFilters.join(','));
          }

          // 视频编码
          args.push('-c:v', 'libx264', '-tune', 'stillimage');

          if (hasAudio) {
            args.push('-c:a', 'aac', '-b:a', '128k');
          }

          args.push('-pix_fmt', 'yuv420p');

          if (hasAudio) {
            args.push('-shortest');
          } else {
            args.push('-t', '5');
          }

          args.push(outputName);

          onProgress('scene', i, 0.55, scenes.length);

          // 执行命令（字幕滤镜可能因缺少libass而失败，需降级重试）
          let execSuccess = false;
          try {
            await ffmpeg.exec(args);
            execSuccess = true;
          } catch (execErr) {
            if (vfFilters.length > 0) {
              // 字幕滤镜可能不支持，去掉-vf参数重试
              console.warn(`Scene ${i} video filter failed, retrying without filter:`, execErr);
              const cleanArgs = [];
              for (let ai = 0; ai < args.length; ai++) {
                if (args[ai] === '-vf') { ai++; continue; } // skip -vf and its value
                cleanArgs.push(args[ai]);
              }
              try {
                await ffmpeg.exec(cleanArgs);
                execSuccess = true;
              } catch (retryErr) {
                throw retryErr;
              }
            } else {
              throw execErr;
            }
          }

          if (!execSuccess) {
            throw new Error('FFmpeg exec failed');
          }

          onProgress('scene', i, 0.9, scenes.length);
          await new Promise(r => setTimeout(r, 30));

          // 读取输出
          const outputData = await ffmpeg.readFile(outputName);
          if (outputData && outputData.length > 0) {
            sceneVideos.push({ name: outputName, data: outputData });
            onSceneStatus(i, 'done');
          } else {
            throw new Error('场景视频输出为空');
          }

          onProgress('scene', i, 1, scenes.length);

          // 清理虚拟文件系统中当前场景的输入文件（释放内存）
          try { await ffmpeg.deleteFile(imgName); } catch(_) {}
          if (hasAudio) { try { await ffmpeg.deleteFile(audioName); } catch(_) {} }
          if (hasSubtitle) { try { await ffmpeg.deleteFile(srtName); } catch(_) {} }
          try { await ffmpeg.deleteFile(outputName); } catch(_) {}

        } catch (e) {
          console.error(`Scene ${i} render failed:`, e);
          failedScenes.push(i);
          onSceneStatus(i, 'failed');
        }

        await new Promise(r => setTimeout(r, 50));
      }

      // 如果所有场景都失败
      if (sceneVideos.length === 0) {
        throw { type: 'all_scenes_failed', failedScenes };
      }

      // 阶段3：拼接合并
      onProgress('concat', 0, 0);

      // 将所有场景视频写回虚拟文件系统
      for (const sv of sceneVideos) {
        await ffmpeg.writeFile(sv.name, sv.data);
      }

      // 生成 filelist.txt
      const fileListContent = sceneVideos.map(sv => `file '${sv.name}'`).join('\n');
      const fileListData = new TextEncoder().encode(fileListContent);
      await ffmpeg.writeFile('filelist.txt', fileListData);

      onProgress('concat', 0, 0.3);
      await new Promise(r => setTimeout(r, 30));

      // 执行拼接
      await ffmpeg.exec(['-f', 'concat', '-safe', '0', '-i', 'filelist.txt', '-c', 'copy', 'output.mp4']);

      onProgress('concat', 0, 0.8);
      await new Promise(r => setTimeout(r, 30));

      // 读取最终视频
      const finalData = await ffmpeg.readFile('output.mp4');

      onProgress('concat', 0, 1);

      // 阶段4：生成下载
      onProgress('download', 0, 0);

      const blob = new Blob([finalData], { type: 'video/mp4' });

      onProgress('download', 0, 1);

      return { blob, failedScenes };
    }

    /* 降级方案：Canvas + MediaRecorder */
    async function renderVideoWithCanvas(scenes, platform, resolution, autoSubtitle, onProgress, onSceneStatus) {
      const canvas = document.createElement('canvas');
      const isVertical = (platform === 'douyin');
      const resMultiplier = { '720p': 0.67, '1080p': 1, '4k': 1 }[resolution] || 1; // 4k降级为1080p
      canvas.width = Math.round((isVertical ? 1080 : 1920) * resMultiplier);
      canvas.height = Math.round((isVertical ? 1920 : 1080) * resMultiplier);
      const ctx = canvas.getContext('2d');

      const stream = canvas.captureStream(30);
      // 尝试使用 mp4 格式，不支持则降级为 webm
      let mimeType = 'video/webm;codecs=vp9';
      if (MediaRecorder.isTypeSupported('video/mp4')) {
        mimeType = 'video/mp4';
      } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
        mimeType = 'video/webm;codecs=vp9';
      } else if (MediaRecorder.isTypeSupported('video/webm')) {
        mimeType = 'video/webm';
      }

      const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 5000000 });
      const chunks = [];

      recorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) chunks.push(e.data);
      };

      return new Promise((resolve, reject) => {
        recorder.onerror = (e) => reject(e);

        recorder.onstop = () => {
          const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
          const blob = new Blob(chunks, { type: mimeType });
          resolve({ blob, failedScenes: [], ext });
        };

        recorder.start(100); // 每100ms收集一次数据

        onProgress('init', 0, 1);

        let sceneIndex = 0;
        let frameCount = 0;
        const fps = 30;
        const sceneDurationSec = 5;
        const framesPerScene = fps * sceneDurationSec;

        function drawFrame() {
          if (sceneIndex >= scenes.length) {
            recorder.stop();
            return;
          }

          const scene = scenes[sceneIndex];
          const w = canvas.width;
          const h = canvas.height;

          // 绘制渐变背景
          const gradients = [
            ['#0f0c29', '#302b63', '#24243e'],
            ['#1a1a2e', '#16213e', '#0f3460'],
            ['#0d0d1a', '#1a1a3e', '#2d1b69'],
            ['#1b1b2f', '#162447', '#1f4068'],
            ['#0a0a23', '#1b1b4b', '#3a0ca3'],
          ];
          const gradColors = gradients[sceneIndex % gradients.length];
          const grad = ctx.createLinearGradient(0, 0, w, h);
          grad.addColorStop(0, gradColors[0]);
          grad.addColorStop(0.5, gradColors[1]);
          grad.addColorStop(1, gradColors[2]);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);

          // 场景名
          ctx.fillStyle = '#ff6b35';
          ctx.font = `bold ${w * 0.04}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText(scene.name || `Scene ${sceneIndex + 1}`, w / 2, h * 0.38);

          // 描述
          ctx.fillStyle = '#e8e8f0';
          ctx.font = `${w * 0.02}px sans-serif`;
          const desc = (scene.description || '').substring(0, 80);
          ctx.fillText(desc, w / 2, h * 0.48);

          // 台词
          if (autoSubtitle && scene.dialogue) {
            ctx.fillStyle = '#a29bfe';
            ctx.font = `${w * 0.016}px sans-serif`;
            const dlg = scene.dialogue.replace(/\n/g, ' ').substring(0, 60);
            ctx.fillText(dlg, w / 2, h * 0.6);
          }

          // 底部水印
          ctx.fillStyle = 'rgba(136,136,170,0.3)';
          ctx.font = `${w * 0.01}px sans-serif`;
          ctx.fillText('漫剧制作工作台', w / 2, h * 0.95);

          frameCount++;
          const sceneProgress = frameCount / framesPerScene;
          onProgress('scene', sceneIndex, sceneProgress, scenes.length);

          if (frameCount >= framesPerScene) {
            onSceneStatus(sceneIndex, 'done');
            sceneIndex++;
            frameCount = 0;
          }

          requestAnimationFrame(drawFrame);
        }

        drawFrame();
      });
    }

    /* ─── 渲染进度弹窗 ─── */
    function RenderProgressModal({ open, scenes, platform, resolution, autoSubtitle, onComplete, onToast }) {
      const [progress, setProgress] = useState(0);
      const [stage, setStage] = useState('init'); // init | scene | concat | download | done | error
      const [stageText, setStageText] = useState('正在初始化渲染引擎...');
      const [sceneStatuses, setSceneStatuses] = useState(() =>
        (scenes || []).map(() => 'pending') // pending | active | done | failed
      );
      const [resultBlob, setResultBlob] = useState(null);
      const [failedScenes, setFailedScenes] = useState([]);
      const [errorMsg, setErrorMsg] = useState('');
      const [usedFallback, setUsedFallback] = useState(false);
      const renderStartedRef = useRef(false);

      const handleProgress = useCallback((stg, sceneIdx, sceneProg, totalScenes) => {
        const total = totalScenes || scenes.length;
        const pct = calculateRenderProgress(stg, sceneIdx, sceneProg, total);
        setProgress(Math.min(Math.round(pct), 100));

        switch (stg) {
          case 'init':
            setStage('init');
            setStageText('正在初始化渲染引擎...');
            break;
          case 'scene':
            setStage('scene');
            setStageText(`正在渲染 Scene ${sceneIdx + 1}/${scenes.length}...`);
            break;
          case 'concat':
            setStage('concat');
            setStageText('正在拼接合并所有场景...');
            break;
          case 'download':
            setStage('download');
            setStageText('正在生成下载文件...');
            break;
        }
      }, [scenes.length]);

      const handleSceneStatus = useCallback((idx, status) => {
        setSceneStatuses(prev => {
          const next = [...prev];
          next[idx] = status;
          return next;
        });
      }, []);

      const startRender = useCallback(async () => {
        if (renderStartedRef.current) return;
        renderStartedRef.current = true;

        let useFFmpeg = isWebAssemblySupported() && typeof FFmpegWASM !== 'undefined' && FFmpegWASM.FFmpeg;

        let ffmpegSucceeded = false;

        if (useFFmpeg) {
          try {
            const result = await renderVideoWithFFmpeg(scenes, platform, resolution, autoSubtitle, handleProgress, handleSceneStatus);
            setProgress(100);
            setStage('done');
            setStageText('✅ 渲染完成！');
            setResultBlob(result.blob);
            setFailedScenes(result.failedScenes);
            if (result.failedScenes.length > 0) {
              onToast(`⚠️ ${result.failedScenes.length} 个场景渲染失败已跳过`, 'warning');
            }
            ffmpegSucceeded = true;
          } catch (e) {
            if (e.type === 'ffmpeg_load_failed') {
              onToast('FFmpeg 加载失败，切换到降级渲染模式...', 'warning');
              useFFmpeg = false;
            } else {
              console.error('FFmpeg render failed:', e);
              setStage('error');
              setErrorMsg('渲染过程中发生错误：' + (e.message || '未知错误'));
              return;
            }
          }
        }

        if (!ffmpegSucceeded) {
          try {
            setUsedFallback(true);
            setSceneStatuses(scenes.map(() => 'pending'));
            const result = await renderVideoWithCanvas(scenes, platform, resolution, autoSubtitle, handleProgress, handleSceneStatus);
            setProgress(100);
            setStage('done');
            setStageText('✅ 渲染完成！（降级模式）');
            setResultBlob(result.blob);
          } catch (e) {
            console.error('Canvas render failed:', e);
            setStage('error');
            setErrorMsg('降级渲染也失败了：' + (e.message || '未知错误'));
          }
        }
      }, [scenes, platform, resolution, autoSubtitle, handleProgress, handleSceneStatus, onToast]);

      useEffect(() => {
        if (open && !renderStartedRef.current) {
          startRender();
        }
      }, [open]);

      const handleDownload = useCallback(() => {
        if (!resultBlob) return;
        const ext = usedFallback ? 'webm' : 'mp4';
        const url = URL.createObjectURL(resultBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `漫剧_${new Date().toISOString().slice(0,10)}.${ext}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
        onToast('📥 视频下载已开始', 'success');
      }, [resultBlob, usedFallback, onToast]);

      const handleRetry = useCallback(() => {
        renderStartedRef.current = false;
        setProgress(0);
        setStage('init');
        setStageText('正在重新初始化渲染引擎...');
        setSceneStatuses(scenes.map(() => 'pending'));
        setResultBlob(null);
        setFailedScenes([]);
        setErrorMsg('');
        setUsedFallback(false);
        setTimeout(() => startRender(), 100);
      }, [scenes, startRender]);

      if (!open) return null;

      const isComplete = stage === 'done';
      const isError = stage === 'error';
      const progressColor = isComplete
        ? 'linear-gradient(90deg, #00b894, #55efc4)'
        : progress > 60
          ? 'linear-gradient(90deg, #fdcb6e, #00b894)'
          : 'linear-gradient(90deg, #ff6b35, #fdcb6e)';

      return (
        <div
          className="fixed inset-0 z-[200] flex items-center justify-center p-4 modal-overlay-in"
          style={{ background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)' }}
